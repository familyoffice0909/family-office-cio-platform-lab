name: CIO Platform CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Apps Script Platform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Validate critical platform files
        shell: bash
        run: |
          required_files=(
            "appsscript.json"
            "Code.js"
            "Config.js"
            "Bootstrap.js"
            "HealthCheck.js"
          )

          missing=0

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required platform file is missing."
              missing=1
            else
              echo "Found $file"
            fi
          done

          spreadsheet_service="$(
            find . \
              -maxdepth 1 \
              -type f \
              -name 'SpreadsheetService*.js' \
              -print \
              -quit
          )"

          if [[ -z "$spreadsheet_service" ]]; then
            echo "::error::A SpreadsheetService JavaScript file is required."
            missing=1
          else
            echo "Found $spreadsheet_service"
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Validate Apps Script manifest
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const manifestPath = 'appsscript.json';

          if (!fs.existsSync(manifestPath)) {
            throw new Error('appsscript.json was not found.');
          }

          const manifest = JSON.parse(
            fs.readFileSync(manifestPath, 'utf8')
          );

          if (manifest.runtimeVersion !== 'V8') {
            throw new Error(
              'appsscript.json must use runtimeVersion V8.'
            );
          }

          if (!manifest.timeZone) {
            throw new Error(
              'appsscript.json must define timeZone.'
            );
          }

          console.log('Apps Script manifest is valid.');
          NODE

      - name: Scan for committed secrets
        shell: bash
        run: |
          forbidden_files=(
            ".clasprc.json"
            ".env"
          )

          found=0

          for file in "${forbidden_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "::error file=$file::Sensitive local configuration must not be committed."
              found=1
            fi
          done

          if [[ "$found" -ne 0 ]]; then
            exit 1
          fi

      - name: CI summary
        shell: bash
        run: |
          echo "Family Office CIO Platform validation completed."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"