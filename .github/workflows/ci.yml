name: CIO Platform CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Apps Script Platform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run architectural validation
        run: npm run validate

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test

      - name: Generate smoke-test inventory
        run: npm run smoke:inventory

      - name: Upload smoke-test inventory
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-source-inventory
          path: artifacts/smoke-test-summary.md
          if-no-files-found: error
          retention-days: 30

      - name: CI summary
        shell: bash
        run: |
          echo "## Family Office CIO Platform CI" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Architectural validation: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- ESLint: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Jest tests: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke-test inventory: generated" >> "$GITHUB_STEP_SUMMARY"
